# Baseline benchmark configuration
# Compares vanilla vLLM vs vanilla SGLang on ShareGPT workload
#
# NOTE: This is a reference spec for documentation. The profiling scripts
# use their own CLI defaults. For the actual sweep, see:
#   scripts/run_all_baselines.sh  (--concurrency flag)
#   profiling/scripts/profile_vllm_scheduler.py  (--concurrency flag)

benchmark:
  name: sharegpt_baseline
  description: "Baseline throughput comparison on real conversation workloads"

dataset:
  name: sharegpt
  num_prompts: 200
  seed: 42

engines:
  - name: vllm
    version: latest
    config:
      model: meta-llama/Llama-3.1-8B-Instruct
      dtype: bfloat16
      gpu_memory_utilization: 0.8
      max_model_len: 8192

  - name: sglang
    version: latest
    config:
      model: meta-llama/Llama-3.1-8B-Instruct
      dtype: bfloat16
      mem_fraction_static: 0.8

concurrency_levels: [1, 8, 32, 64, 128, 256]

metrics:
  - throughput_toks_per_sec
  - ttft_ms_p50
  - ttft_ms_p99
  - tpot_ms_p50
  - tpot_ms_p99
  - gpu_utilization_pct
  - scheduling_overhead_pct

hardware:
  # Fill in your actual hardware
  gpu: "NVIDIA A100 80GB"  # or H100, etc.
  cpu: "TBD"
  ram_gb: "TBD"
