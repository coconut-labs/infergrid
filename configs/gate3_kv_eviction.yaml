# Gate 3 — Tenant-aware KV eviction. Path C measurement probe (W3, $8).
#
# Three arms designed to disentangle eviction-policy gain from
# admission-policy gain. Run on 1× A100 SXM4 80GB, vLLM 0.19.1,
# Llama-3.1-8B-Instruct, N=8 tenants (1 flooder + 7 quiet), 70% prompt
# prefix overlap (RAG-style: long shared doc + short tenant-specific
# query), flooder 32 RPS, quiet 1 RPS each, 300 s sustained, 3 seeds.
#
# Hypothesis: at the engine pressure created by 32:1 RPS skew + heavy
# prefix overlap + tight gpu_memory_utilization=0.40, LRU eviction
# starves the quiet tenants by recycling their cache blocks under
# flooder pressure. Tenant-aware eviction keeps quiet blocks resident.
#
# Pre-committed thresholds (Arm 2 oracle vs Arm 1 LRU baseline,
# quiet-tenant p99 TTFT, median across 7 quiets):
#   ≥ 1.5×  → green; W4 implementation worth pursuing
#   1.2-1.5× → yellow; W4 ships flag-gated experimental
#   < 1.2×  → red; publish disconfirm, T2 closes with null result
#
# Path C probe runs Arm 1 + Arm 2 ONLY in W3 ($8). Arm 3 lands in W6
# after the W4 reuse_score wiring is in main. See
# docs/runbooks/gate3_kv_eviction.md.
#
# IMPORTANT: capacity pressure is the load-bearing knob. gpu_memory_utilization
# is held to 0.40 (vs the 0.85 used in N=8 fairness baseline) so KV cache
# pressure binds the eviction policy. With 0.85 on A100 80GB the engine has
# enough headroom that eviction barely fires; the test becomes a no-op.
# If OOM at runtime, drop to 0.35 per the runbook fix-list.

# ---------------------------------------------------------------------------
# Arm 1 — LRU baseline (current code).
#
# DRR admission + token-bucket per-tenant rate limit, identical to the
# Gate 2 N=8 hero. NO cache_manager policy override. The router's
# CacheManager today only invokes free_blocks_for_model on model
# unload (router.py:346) and snapshot() on /kvwarden/status
# (router.py:1006); per-block reuse_score is dead code — engine LRU is
# the de facto eviction policy. Arm 1 thus measures status quo.
#
# Establishes the fairness floor we need to beat. Path-C-runnable today.
# ---------------------------------------------------------------------------
arm1_lru_baseline: &arm1_lru_baseline
  host: 0.0.0.0
  port: 8000
  gpu_budget_fraction: 0.92

  max_concurrent: 512
  admission_queue_size: 4096
  engine_start_timeout_s: 420
  log_level: INFO

  tenant_defaults:
    max_concurrent_requests: 256
    rate_limit_rpm: 600
    rate_limit_burst: 10
    priority: 1
    scheduling: drr

  models:
    - model_id: "meta-llama/Llama-3.1-8B-Instruct"
      short_name: "llama31-8b"
      engine: "vllm"
      dtype: "bfloat16"
      gpu_memory_utilization: 0.40
      max_model_len: 4096
      tensor_parallel_size: 1

  # Forward-looking key (W4+ semantics; the v0.1 loader silently ignores it).
  # Pinned here so Arm 1's diff vs Arm 2 is one block, not two.
  cache_manager:
    policy: lru
    tenant_aware: false

# ---------------------------------------------------------------------------
# Arm 2 — Oracle tenant-aware (synthetic upper bound).
#
# Pre-tagged blocks with perfect tenant attribution; flooder weight 0.1,
# quiet weight 1.0 (10× preference for keeping quiet-tenant blocks
# resident). Measures the achievable upper bound for the W4 reuse_score
# implementation. **Path-C decision rule: if Arm 2 - Arm 1 quiet-p99
# TTFT delta < 1.2×, the W4 implementation cannot exceed it; close T2
# with disconfirm before A1 is built.**
#
# OPERATOR NOTE: "oracle" requires a one-off bench-side mock — the
# benchmark harness must pin one tenant's blocks (no eviction) and let
# the rest contend under LRU. The W4-wired implementation cannot run
# this arm yet (the hot-path wiring lands W4-W6). The runbook
# documents the mock procedure. This arm IS the Path C probe.
# ---------------------------------------------------------------------------
arm2_oracle_tenant_aware: &arm2_oracle_tenant_aware
  host: 0.0.0.0
  port: 8000
  gpu_budget_fraction: 0.92

  max_concurrent: 512
  admission_queue_size: 4096
  engine_start_timeout_s: 420
  log_level: INFO

  tenant_defaults:
    max_concurrent_requests: 256
    rate_limit_rpm: 600
    rate_limit_burst: 10
    priority: 1
    scheduling: drr

  models:
    - model_id: "meta-llama/Llama-3.1-8B-Instruct"
      short_name: "llama31-8b"
      engine: "vllm"
      dtype: "bfloat16"
      gpu_memory_utilization: 0.40
      max_model_len: 4096
      tensor_parallel_size: 1

  # Future-schema (W4 reads this; v0.1 loader ignores). Mock implements
  # weight semantics bench-side for Arm 2.
  cache_manager:
    policy: tenant_aware_oracle
    tenant_aware: true
    tenant_weights:
      flooder: 0.1
      quiet_0: 1.0
      quiet_1: 1.0
      quiet_2: 1.0
      quiet_3: 1.0
      quiet_4: 1.0
      quiet_5: 1.0
      quiet_6: 1.0
    # Oracle-only: synthesize logical block IDs from prompt prefix hash
    # and pin blocks for tenants with weight ≥ 1.0 (never evict).
    pin_blocks_above_weight: 0.5

# ---------------------------------------------------------------------------
# Arm 3 — DRR + token-bucket only (no eviction policy override).
#
# Identical to the v3 hero config — admission-side fairness alone, no
# cache-side intervention. Lets the post-bench analysis tease apart
# what's coming from admission policy (DRR + rate limit) alone vs
# eviction policy alone vs both stacked.
#
# In practice Arm 3 is operationally the same as Arm 1 today (because
# Arm 1's cache_manager block is silently ignored by the v0.1 loader).
# Kept as a separate arm for experimental cleanliness — once W4 ships,
# Arm 1 becomes "LRU explicit", Arm 3 stays "no policy override". A
# meaningful Arm 3 vs Arm 1 delta after W4 lands would flag a
# regression in the LRU default path.
# ---------------------------------------------------------------------------
arm3_admission_only: &arm3_admission_only
  host: 0.0.0.0
  port: 8000
  gpu_budget_fraction: 0.92

  max_concurrent: 512
  admission_queue_size: 4096
  engine_start_timeout_s: 420
  log_level: INFO

  tenant_defaults:
    max_concurrent_requests: 256
    rate_limit_rpm: 600
    rate_limit_burst: 10
    priority: 1
    scheduling: drr

  models:
    - model_id: "meta-llama/Llama-3.1-8B-Instruct"
      short_name: "llama31-8b"
      engine: "vllm"
      dtype: "bfloat16"
      gpu_memory_utilization: 0.40
      max_model_len: 4096
      tensor_parallel_size: 1

  # No cache_manager block — Arm 3 leaves the eviction default
  # untouched. Once W4 lands and the loader wires cache_manager.policy,
  # Arm 3 == Arm 1 should hold.

# ---------------------------------------------------------------------------
# Top-level config — Arm 1 values flow through the merge key so
# `kvwarden serve --config configs/gate3_kv_eviction.yaml` boots
# cleanly. The v0.1 loader (src/kvwarden/common/config.py) reads only
# the top-level keys; the per-arm anchors above are visible to
# bench-side tooling and to W4 wiring after it lands.
#
# Arm differentiation today happens BENCH-SIDE, not via a
# server-config switch: Arm 2's oracle pinning is a one-off mock at
# the bench harness layer (see runbook §Pre-flight item 1), and Arm 3
# is operationally Arm 1 (no cache_manager block read). Once W4 wires
# the cache_manager loader, this file gains a meaningful --arm
# selection mechanism; until then, the runbook documents how each arm
# is realized at run time.
# ---------------------------------------------------------------------------
